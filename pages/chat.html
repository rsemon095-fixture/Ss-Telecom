<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM - Chat Board</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#111;
color:#fff;
}

header{
background:#00c853;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.chat-box{
height:70vh;
overflow-y:auto;
padding:15px;
background:#1b1b1b;
}

.message{
background:#2b2b2b;
padding:10px 15px;
border-radius:10px;
margin-bottom:10px;
}

.message strong{
color:#00ff80;
}

.send-box{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
padding:10px;
background:#222;
}

.send-box input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;
}

.send-box button{
margin-left:10px;
padding:12px 20px;
border:none;
background:#00c853;
color:#fff;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

💬 SS TELECOM Chat
