<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SS TELECOM Chat</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

body{
background:#0f172a;
margin:0;
font-family:Arial,sans-serif;
color:#fff;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.back{
color:#fff;
text-decoration:none;
}

h1{
text-align:center;
color:#00ff80;
}

#chatBox{
height:420px;
overflow-y:auto;
background:#1e293b;
padding:15px;
border-radius:12px;
margin:20px 0;
}

.message{
background:#334155;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.message strong{
color:#00ff80;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
margin-top:15px;
padding:14px;
background:#00c853;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="../dashboard.html">⬅ Dashboard</a>

<h1>SS TELECOM Chat</h1>

<div id="chatBox"></div>

<input
type="text"
id="userName"
placeholder="Your Name">

<input
type="text"
id="message"
placeholder="Write Message">

<button id="sendBtn">

Send Message

</button>

</div>

<script type="module" src="../js/chat.js"></script>

</body>
</html>
