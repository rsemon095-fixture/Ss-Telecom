<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM | Product Entry</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    font-family:Poppins,sans-serif;
    color:#fff;
}

.container{
    max-width:700px;
    margin:auto;
}
<hr style="margin:25px 0;border:1px solid #334155;">

<h2 style="text-align:center;color:#00ff80;">
Stock Summary
</h2>

<div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:20px 0;">

<div style="flex:1;min-width:150px;background:#0f172a;padding:15px;border-radius:10px;text-align:center;">
<h3 id="totalProducts">0</h3>
<p>Total Products</p>
</div>

<div style="flex:1;min-width:150px;background:#0f172a;padding:15px;border-radius:10px;text-align:center;">
<h3 id="totalQty">0</h3>
<p>Total Quantity</p>
</div>

</div>

<h2 style="text-align:center;color:#00ff80;margin-top:25px;">
Product List
</h2>

<div style="overflow-x:auto;">

<table style="width:100%;border-collapse:collapse;margin-top:15px;">

<thead>

<tr style="background:#00c853;color:#fff;">

<th style="padding:10px;">Product</th>
<th style="padding:10px;">Category</th>
<th style="padding:10px;">Buy</th>
<th style="padding:10px;">Sell</th>
<th style="padding:10px;">Qty</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module" src="../js/products.js"></script>

</body>
</html>
.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    color:#00ff80;
    margin-bottom:20px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#00c853;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00a844;
}

</style>

</head>

<body>

<div class="container">

<a href="../dashboard.html" class="back">⬅ Dashboard</a>

<div class="card">

<h1>Product Entry</h1>

<label>Product Name</label>

<input
type="text"
id="productName"
placeholder="Enter Product Name">

<label>Category</label>

<select id="category">

<option>Ear Phone</option>
<option>Charger</option>
<option>Bluetooth Speaker</option>
<option>USB Cable</option>
<option>LED Light</option>
<option>Other</option>

</select>

<label>Buy Price (৳)</label>

<input
type="number"
id="buyPrice"
placeholder="0">

<label>Sell Price (৳)</label>

<input
type="number"
id="sellPrice"
placeholder="0">

<label>Quantity</label>

<input
type="number"
id="quantity"
placeholder="0">

<button id="saveProduct">

SAVE PRODUCT

  </button>
