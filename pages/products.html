<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM | Product Entry</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    font-family:Poppins,sans-serif;
    color:#fff;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    color:#00ff80;
    margin-bottom:20px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#00c853;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00a844;
}

</style>

</head>

<body>

<div class="container">

<a href="../dashboard.html" class="back">⬅ Dashboard</a>

<div class="card">

<h1>Product Entry</h1>

<label>Product Name</label>

<input
type="text"
id="productName"
placeholder="Enter Product Name">

<label>Category</label>

<select id="category">

<option>Ear Phone</option>
<option>Charger</option>
<option>Bluetooth Speaker</option>
<option>USB Cable</option>
<option>LED Light</option>
<option>Other</option>

</select>

<label>Buy Price (৳)</label>

<input
type="number"
id="buyPrice"
placeholder="0">

<label>Sell Price (৳)</label>

<input
type="number"
id="sellPrice"
placeholder="0">

<label>Quantity</label>

<input
type="number"
id="quantity"
placeholder="0">

<button id="saveProduct">

SAVE PRODUCT

  </button>
