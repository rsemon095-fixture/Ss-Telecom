<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM | Add Money</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

body{
background:#0f172a;
font-family:Poppins,sans-serif;
color:#fff;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.30);
}

.back{
color:#fff;
text-decoration:none;
display:inline-block;
margin-bottom:20px;
}

h1{
text-align:center;
color:#00ff80;
}

.balance{
font-size:40px;
font-weight:bold;
text-align:center;
margin:20px 0;
color:#00ff80;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#00c853;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#009624;
}

</style>

</head>

<body>

<div class="container">

<a href="../dashboard.html" class="back">
⬅ Dashboard
</a>

<div class="card">

<h1>Add Money</h1>

<div class="balance" id="totalBalance">

৳ 0

</div>

<label>Amount</label>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button id="saveMoney">

ADD MONEY

</button>

</div>

</div>

<script type="module" src="../js/addmoney.js"></script>

</body>

</html>
