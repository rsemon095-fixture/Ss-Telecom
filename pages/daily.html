<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM | Daily Report</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

body{
background:#0f172a;
font-family:Poppins,sans-serif;
color:#fff;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#fff;
text-decoration:none;
}

h1{
text-align:center;
color:#00ff80;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
text-align:center;
}

.card h3{
margin:0;
color:#00ff80;
}

.amount{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<a href="../dashboard.html" class="back">⬅ Dashboard</a>

<h1>Today's Report</h1>

<div class="grid">

<div class="card">
<h3>Today's Flexiload</h3>
<div class="amount" id="loadTotal">৳ 0</div>
</div>

<div class="card">
<h3>Add Money</h3>
<div class="amount" id="moneyTotal">৳ 0</div>
</div>

<div class="card">
<h3>Due Money</h3>
<div class="amount" id="dueTotal">৳ 0</div>
</div>

<div class="card">
<h3>Products</h3>
<div class="amount" id="productTotal">0</div>
</div>

</div>

</div>

<script type="module" src="../js/report.js"></script>

</body>

  </html>
