<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM | Flexiload</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#0f172a;
    color:#fff;
}

.container{
    max-width:500px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

h1{
    color:#00ff80;
    margin-bottom:20px;
}

.total{
    font-size:40px;
    font-weight:bold;
    color:#00ff80;
    margin:20px 0;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    margin-top:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00a844;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#fff;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<a href="../dashboard.html" class="back">⬅ Dashboard</a>

<div class="card">

<h1>Today's Total Load</h1>

<div class="total" id="todayTotal">
৳ 0
</div>

<input
type="number"
id="amount"
placeholder="Enter Load Amount">

<button id="saveBtn">
SAVE LOAD
</button>

</div>

</div>

<script type="module" src="../js/flexiload.js"></script>

</body>
</html>
