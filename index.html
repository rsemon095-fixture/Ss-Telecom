<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS TELECOM CENTER</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animation.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- Loader -->

<div class="loader" id="loader">

<img src="assets/logo-jpg.png" class="logo" alt="SS TELECOM">

<h1 class="title">SS TELECOM</h1>

<p class="owner">
Owner : Mohammad Sumon
</p>

<div class="loading-bar">
<span></span>
</div>

</div>

<!-- Login Box -->

<div class="login-container home">

<div class="login-box">

<img src="assets/logo-jpg.png" class="login-logo">

<h2>Welcome</h2>

<p>SS TELECOM Shop Management System</p>

<form id="loginForm">

<div class="input-box">

<input
type="email"
id="email"
placeholder="Email"
required>

</div>

<div class="input-box">

<input
type="password"
id="password"
placeholder="Password"
required>

</div>

<button
type="submit"
class="login-btn">

LOGIN

</button>

</form>

<p id="msg"></p>

</div>

</div>

<script type="module" src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>

</html>
