<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS TELECOM Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <!-- Header Section -->
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-center text-blue-800">SS TELECOM</h1>
        
        <!-- Brand Logos -->
        <div class="flex justify-center gap-4 my-6 flex-wrap">
            <span class="bg-blue-100 px-3 py-1 rounded">GP</span>
            <span class="bg-red-100 px-3 py-1 rounded">Airtel</span>
            <span class="bg-pink-100 px-3 py-1 rounded">bKash</span>
            <span class="bg-orange-100 px-3 py-1 rounded">Nagad</span>
        </div>

        <!-- Dashboard Buttons -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="showSection('sales')" class="bg-blue-600 text-white p-4 rounded-lg">বিক্রয় এন্ট্রি</button>
            <button onclick="showSection('inventory')" class="bg-green-600 text-white p-4 rounded-lg">স্টক দেখুন</button>
            <button onclick="showSection('due')" class="bg-yellow-600 text-white p-4 rounded-lg">বকেয়া হিসেব</button>
            <button onclick="showSection('report')" class="bg-purple-600 text-white p-4 rounded-lg">রিপোর্ট</button>
        </div>
    </div>

    <!-- Dynamic Content Area -->
    <div id="content" class="max-w-4xl mx-auto mt-6 bg-white p-6 rounded-lg shadow-lg min-h-[300px]">
        <h2 class="text-xl font-semibold">স্বাগতম! মেনু থেকে সিলেক্ট করুন।</h2>
    </div>

    <script>
        // ডেটা জমা রাখার জন্য একটি অ্যারে
let transactions = JSON.parse(localStorage.getItem('ss_telecom_data')) || [];

function showSection(section) {
    const content = document.getElementById('content');
    
    if (section === 'sales') {
        content.innerHTML = `
            <h2 class='text-xl font-bold mb-4'>নতুন বিক্রয় এন্ট্রি</h2>
            <div id="chat-box" class="h-40 overflow-y-auto border p-2 mb-4 bg-gray-50 rounded"></div>
            <input type='text' id='item' placeholder='পণ্যের নাম' class='w-full border p-2 mb-2'>
            <input type='number' id='price' placeholder='দাম' class='w-full border p-2 mb-2'>
            <button onclick='saveSale()' class='bg-blue-600 text-white px-4 py-2 w-full rounded'>জমা করুন</button>
        `;
        renderChat();
    }
}

function saveSale() {
    const item = document.getElementById('item').value;
    const price = document.getElementById('price').value;
    
    if(item && price) {
        const entry = { item, price, date: new Date().toLocaleDateString() };
        transactions.push(entry);
        localStorage.setItem('ss_telecom_data', JSON.stringify(transactions));
        renderChat();
        // ইনপুট খালি করা
        document.getElementById('item').value = '';
        document.getElementById('price').value = '';
    }
}

function renderChat() {
    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML = transactions.map(t => 
        `<div class='mb-2 p-2 bg-blue-100 rounded self-start'>
            <strong>${t.item}</strong>: ${t.price} টাকা
        </div>`
    ).join('');
        }
        function showSection(section) {
            const content = document.getElementById('content');
            if(section === 'sales') {
                content.innerHTML = `<h2 class='text-xl mb-4'>পণ্য বিক্রয় এন্ট্রি</h2>
                <input type='text' placeholder='পণ্যের নাম' class='w-full border p-2 mb-2'>
                <input type='number' placeholder='দাম' class='w-full border p-2 mb-2'>
                <button class='bg-blue-500 text-white px-4 py-2 rounded'>সেভ করুন</button>`;
            } else if(section === 'inventory') {
                content.innerHTML = `<h2 class='text-xl'>স্টক ব্যালেন্স</h2><p>ইয়ারফোন: ১০টি, চার্জার: ৫টি...</p>`;
            }
            // অন্যান্য সেকশন এখানে যুক্ত হবে
        }
    </script>
</body>
</html>
